<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="">
    <meta name="keywords" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>toDoList제작실습</title>
    <!-- 웹 아이콘 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- 웹글꼴 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" />
    <link rel="shortcut icon" href="" type="image/x-icon"><!-- farvicon -->
    <link rel="stylesheet" href="./styles/reset.css"><!-- ★reset 먼저작성 -->
    <!-- <link rel="stylesheet" href="./styles/index.css"><!-- css -->
    <link rel="stylesheet" href="./styles/study.css"><!-- css -->

</head>

<body>
    <div id="wrap">
        <header>
            <div class="title_menu"><!-- 1행 로고, 검색, 메뉴-->
                <h1 class="main_title"><a href="#">To Do</a></h1>
                <div class="search_menu_btn">
                    <a href="#" class="search_icon_btn"><img src="./images/search icon.svg" alt="검색하기"></a>
                    <a href="#" class="menu_icon_btn"><img src="./images/s.svg" alt="메뉴보기"></a>
                </div>
            </div>
            <div class="all_today_text"><!-- 2행(전체, 보기메뉴)-->
                <a href="#" class="all active">All<span class="num">(3)</span></a>
                <a href="#" class="today">Today<span class="num">(0)</span></a>
            </div>
        </header>
        <main>
            <!-- 메인리스트 -->
            <ul class="to_do_list">
                <li>
                    <a href="#" class="date">05.12</a>
                    <a href="#" class="contents">매일 책 15분 읽기 목표</a>
                </li>
                <li>
                    <a href="#" class="date">05.12</a>
                    <a href="#" class="contents">매일 책 15분 읽기 목표</a>
                </li>
                <li>
                    <a href="#" class="date">05.12</a>
                    <a href="#" class="contents">매일 책 15분 읽기 목표</a>
                </li>
                <li>
                    <a href="#" class="date">05.12</a>
                    <a href="#" class="contents">매일 책 15분 읽기 목표</a>
                </li>
            </ul>
            <!-- 버튼 제작 & 기능 -> 화면에 고정된 버튼 제작 & 버튼 눌렀을 시 팝업 창 내용 제작  -->
            <a href="#" class="write_btn"><img src="./images/CTA_write_btn.svg" alt="글쓰기버튼"></a>
            <!-- 글 작성 & 기능 -> 저장한 기록을 눌렀을 때 특정 기록 del표시 -->
            <div class="write_popup">
                <p class="notice">add a new task</p>
                <a href="#" class="register_btn"><img src="./images/register_btn.svg" alt=""></a>
            </div>
        </main>
    </div><!-- e:#wrap -->
</body>

</html>
